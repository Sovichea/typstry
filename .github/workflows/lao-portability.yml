name: Lao Portability Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src-tauri/src/segmentation/**"
      - "src/editor/editingPolicies/**"
      - "src/languageSupport.ts"
      - "tests/fixtures/lao/**"
      - "tests/laoReference.test.ts"
      - "tests/khmerReference.test.ts"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  push:
    branches: [main]
    paths:
      - "src-tauri/src/segmentation/**"
      - "src/editor/editingPolicies/**"
      - "tests/fixtures/lao/**"
      - "tests/laoReference.test.ts"

jobs:
  lao-and-khmer-fixtures:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Run Lao baseline and locked Khmer regression fixtures
        run: bun run test:lao
      - name: Run native Lao tokenizer and mixed-provider fixtures
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib lao_
