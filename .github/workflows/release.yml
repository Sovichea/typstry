name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build Release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles msi'
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: '--bundles appimage,deb'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> src-tauri/target'

      - name: Install Frontend Dependencies
        run: bun install --frozen-lockfile

      - name: Enable Updater Artifacts for Release
        run: |
          bun -e 'const fs = require("fs"); const file = "src-tauri/tauri.conf.json"; const config = JSON.parse(fs.readFileSync(file, "utf8")); config.bundle.createUpdaterArtifacts = true; fs.writeFileSync(file, JSON.stringify(config, null, 2) + "\n");'

      - name: Load Versioned Release Notes
        id: release-notes
        shell: bash
        run: |
          version="$(bun -e 'console.log(require("./package.json").version)')"
          notes="docs/RELEASE_NOTES_V${version}.md"
          test -f "$notes"
          {
            echo 'body<<TYPSASTRA_RELEASE_NOTES'
            cat "$notes"
            echo 'TYPSASTRA_RELEASE_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Typsastra v__VERSION__'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
